---
# Extract text from an image file
# Parameters:
#   extract_image_path: The local image file path to extract text
# Return:
#   extract_image_text: The text extracted from the image file 
#
- name: "Check local image file path is an absolute path"
  ansible.builtin.assert:
    that:
      - extract_image_path is defined
      - extract_image_path
      - extract_image_path is ansible.builtin.abs
    fail_msg: "Parameter 'extract_image_path' must be set with a local absolute path"

- name: "Initialize the facts for extracting image text"
  ansible.builtin.set_fact:
    extract_image_text: ""

- name: "Extract text from local image"
  ansible.builtin.script: "../tools/extractor.py {{ extract_image_path }}"
  ignore_errors: True
  register: extract_text_result

- name: "Set fact of extracted image text"
  ansible.builtin.set_fact:
    extract_image_text: "{{ extract_text_result.stdout }}"
