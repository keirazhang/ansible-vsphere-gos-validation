---
# Guest id "oraclelinux7_64Guest" and full name "Oracle Linux 7 (64-bit)" is available on ESXi 6.5 or later (HWv >= 13)
# Guest id "oraclelinux8_64Guest" and full name "Oracle Linux 8 (64-bit)" is available on ESXi 6.7 or later (HWv >= 14)
# Guest id "oraclelinux9_64Guest" and full name "Oracle Linux 9 (64-bit)" is available on ESXi 7.0.1 or later (HWv >= 18)
- name: "Set fact of expected guest OS major version on ESXi {{ esxi_version }}"
  ansible.builtin.set_fact:
      {%- if esxi_latest_hardware_version >= 13 and esxi_latest_hardware_version < 14 -%}
      {{ [guest_os_ansible_distribution_major_ver | int, 7] | min }}
      {%- elif esxi_latest_hardware_version >= 14 and esxi_latest_hardware_version < 18 -%}
      {{ [guest_os_ansible_distribution_major_ver | int, 8] | min }}
      {%- elif esxi_latest_hardware_version >= 18 and esxi_latest_hardware_version < 21 -%}
      {{ [guest_os_ansible_distribution_major_ver | int, 9 ] | min }}
      {%- elif esxi_latest_hardware_version > 21 -%}
      {{ [guest_os_ansible_distribution_major_ver | int, 10 ] | min }}
      {%- endif %}

- name: "Set expected_guest_fullname for Oracle Linux {{ guest_os_ansible_distribution_major_ver }} on ESXi {{ esxi_version }}"
  ansible.builtin.set_fact:
    expected_guest_id: "oracleLinux{{ expected_guest_major_ver }}{{ expected_guest_id_suffix }}"
    expected_guest_fullname: "Oracle Linux {{ expected_guest_major_ver }} ({{ guest_os_bit }})"
  when: expected_guest_major_ver
